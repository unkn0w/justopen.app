<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <meta name="description" content="{{meta_description}}">
    <meta name="color-scheme" content="dark">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-black font-mono text-base text-zinc-100 antialiased selection:bg-emerald-500/40 selection:text-emerald-100">
    <div class="flex min-h-screen flex-col">
        <header class="mx-auto flex w-full max-w-3xl items-center justify-between gap-4 px-5 py-6">
            <a class="text-lg font-semibold text-zinc-100 hover:text-emerald-300" href="{{home_url}}"><span class="text-emerald-400">~/</span>{{t.nav_title}}</a>
            <details class="group relative">
                <summary class="flex cursor-pointer list-none items-center gap-2 border border-emerald-400/70 bg-emerald-500/5 px-3 py-1.5 text-sm font-semibold text-emerald-200 transition hover:bg-emerald-400/15 hover:text-emerald-100">
                    <span>{{t.language_label}}</span>
                    <span class="text-xs text-zinc-400 group-open:rotate-180">v</span>
                </summary>
                <nav class="absolute right-0 z-10 mt-2 min-w-36 border border-zinc-700 bg-zinc-950 p-2 text-sm shadow-xl shadow-black/50" aria-label="{{t.language_label}}">
                    <a class="block px-3 py-2 {{language_pl_class}}" href="?lang=pl">{{t.language_pl}}</a>
                    <a class="block px-3 py-2 {{language_en_class}}" href="?lang=en">{{t.language_en}}</a>
                </nav>
            </details>
        </header>
        <main class="mx-auto w-full max-w-3xl flex-1 px-5 py-10">
            {{{content}}}
        </main>
        <footer class="mx-auto w-full max-w-3xl px-5 py-6 text-base text-zinc-400">
            <p>// {{t.footer_hosted}} <a class="text-emerald-300 hover:text-emerald-200" href="https://mikr.us" rel="noopener noreferrer">mikr.us</a> &middot; {{t.footer_credit}} <a class="text-emerald-300 hover:text-emerald-200" href="https://mrugalski.pl" rel="noopener noreferrer">Jakub 'unknow' Mrugalski</a> &middot; <a class="text-emerald-300 hover:text-emerald-200" href="https://github.com/unkn0w/justopen.app" rel="noopener noreferrer" target="_blank">{{t.footer_source}}</a></p>
        </footer>
    </div>
</body>
</html>
